version: "3.9"

services:
  postgres:
    image: timescale/timescaledb:2.22.1-pg17
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly yes
    restart: unless-stopped
    volumes:
      - redisdata:/data

  api:
    build:
      context: ../..
      dockerfile: api/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres
      REDIS_URL: redis://redis:6379/1
      JWT_SECRET: ${JWT_SECRET}
      ALLOW_ORIGINS: ${ALLOW_ORIGINS}
      TZ: ${TZ}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      TG_API_ID: ${TG_API_ID}
      TG_API_HASH: ${TG_API_HASH}
      SESSION_PATH: /sessions/collector.session
      CHAT_AUTHORS_ENABLED: ${CHAT_AUTHORS_ENABLED:-true}
      CHAT_AUTHORS_MAX_LOOKBACK_DAYS: ${CHAT_AUTHORS_MAX_LOOKBACK_DAYS:-30}
      CHAT_AUTHORS_DEFAULT_LOOKBACK_DAYS: ${CHAT_AUTHORS_DEFAULT_LOOKBACK_DAYS:-30}
      CHAT_AUTHORS_MAX_MESSAGES_PER_JOB: ${CHAT_AUTHORS_MAX_MESSAGES_PER_JOB:-100000}
      CHAT_AUTHORS_HISTORY_WAIT_SECONDS: ${CHAT_AUTHORS_HISTORY_WAIT_SECONDS:-1.5}
      CHAT_AUTHORS_MAX_CONCURRENT_JOBS_GLOBAL: ${CHAT_AUTHORS_MAX_CONCURRENT_JOBS_GLOBAL:-1}
      CHAT_AUTHORS_MIN_SECONDS_BETWEEN_JOBS: ${CHAT_AUTHORS_MIN_SECONDS_BETWEEN_JOBS:-60}
      CHAT_AUTHORS_AUTO_RESUME_FLOOD_WAIT: ${CHAT_AUTHORS_AUTO_RESUME_FLOOD_WAIT:-true}
    volumes:
      - sessions:/sessions
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  collector:
    build:
      context: ../..
      dockerfile: collector/Dockerfile
    environment:
      TG_API_ID: ${TG_API_ID}
      TG_API_HASH: ${TG_API_HASH}
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres
      REDIS_URL: redis://redis:6379/0
      SESSION_PATH: /sessions/collector.session
      TZ: ${TZ}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-30}
      CHAT_AUTHORS_ENABLED: ${CHAT_AUTHORS_ENABLED:-true}
      CHAT_AUTHORS_MAX_LOOKBACK_DAYS: ${CHAT_AUTHORS_MAX_LOOKBACK_DAYS:-30}
      CHAT_AUTHORS_DEFAULT_LOOKBACK_DAYS: ${CHAT_AUTHORS_DEFAULT_LOOKBACK_DAYS:-30}
      CHAT_AUTHORS_MAX_MESSAGES_PER_JOB: ${CHAT_AUTHORS_MAX_MESSAGES_PER_JOB:-100000}
      CHAT_AUTHORS_HISTORY_WAIT_SECONDS: ${CHAT_AUTHORS_HISTORY_WAIT_SECONDS:-1.5}
      CHAT_AUTHORS_MAX_CONCURRENT_JOBS_GLOBAL: ${CHAT_AUTHORS_MAX_CONCURRENT_JOBS_GLOBAL:-1}
      CHAT_AUTHORS_MIN_SECONDS_BETWEEN_JOBS: ${CHAT_AUTHORS_MIN_SECONDS_BETWEEN_JOBS:-60}
      CHAT_AUTHORS_AUTO_RESUME_FLOOD_WAIT: ${CHAT_AUTHORS_AUTO_RESUME_FLOOD_WAIT:-true}
    volumes:
      - sessions:/sessions
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    build:
      context: ../..
      dockerfile: web/Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE}
      NEXT_PUBLIC_AUTO_LOGIN_EMAIL: ${NEXT_PUBLIC_AUTO_LOGIN_EMAIL:-admin@example.com}
      NEXT_PUBLIC_AUTO_LOGIN_PASSWORD: ${NEXT_PUBLIC_AUTO_LOGIN_PASSWORD:-ChangeMe123!}
      INTERNAL_API_BASE: ${INTERNAL_API_BASE}
      TZ: ${TZ}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started

volumes:
  pgdata:
  redisdata:
  sessions:
